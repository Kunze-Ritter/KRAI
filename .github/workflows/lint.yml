name: Lint & Type Check

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main, develop]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # Pin to the versions used by .pre-commit-config.yaml so CI matches local results
      # (unpinned linters drift — a newer ruff flags rules the local gate never saw).
      - name: Install dependencies
        run: pip install ruff==0.8.1 black==24.10.0 isort==5.13.2 "bandit[toml]==1.8.0" mypy

      - name: Run Ruff
        run: ruff check backend/

      - name: Run Black
        run: black --check backend/

      - name: Run isort
        run: isort --check-only backend/

      - name: Run Bandit
        run: bandit -r backend/ -x tests/ -ll -c pyproject.toml

      # Non-blocking: pre-existing type debt is tracked separately, not a merge gate yet.
      - name: Run MyPy
        run: mypy backend/ --ignore-missing-imports
        continue-on-error: true
